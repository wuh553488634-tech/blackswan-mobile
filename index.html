<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BlackSwan</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Segoe UI,PingFang SC,sans-serif;background:#0a0e17;color:#e5e7eb;padding:10px}.header{background:linear-gradient(135deg,#1a1040,#0a1a30);border:1px solid #8b5cf6;border-radius:10px;padding:10px 14px;margin-bottom:10px}.header h1{font-size:16px;color:#8b5cf6}.card{background:#111827;border:1px solid #2a3040;border-radius:8px;padding:10px;margin-bottom:8px}.stat{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}.stat>div{background:#111827;border:1px solid #2a3040;border-radius:6px;padding:8px;text-align:center}.val{font-size:18px;font-weight:700;color:#10b981}.lbl{font-size:10px;color:#6b7280}.ai-input{display:flex;gap:6px;margin-bottom:8px}.ai-input input{flex:1;background:#1a1f2e;border:1px solid #2a3040;border-radius:8px;color:#e5e7eb;padding:10px 12px;font-size:14px}.ai-input input:focus{outline:none;border-color:#8b5cf6}.ai-input button{background:#8b5cf6;color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer}.ai-output{background:#111827;border:1px solid #2a3040;border-radius:8px;padding:10px;min-height:60px;font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-word;max-height:350px;overflow-y:auto}.news-item{font-size:11px;padding:6px 0;border-bottom:1px solid #1a1f2e;line-height:1.5}.badge{padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;margin-right:4px}.t0{background:#ef4444;color:#fff}.t1{background:#f59e0b;color:#000}.t2{background:#3b82f6;color:#fff}.t3{background:#6b7280;color:#fff}.loading{text-align:center;padding:20px;color:#6b7280;font-size:12px}.meta{font-size:9px;color:#6b7280;margin-top:2px}</style></head>
<body>
<div class=header><h1>BlackSwan</h1><p id=statusLine>Online</p></div>
<div class=stat><div><div class=lbl>BTC</div><div class=val id=btcPrice>...</div></div><div><div class=lbl>News</div><div class=val id=newsTotal>...</div></div><div><div class=lbl>Alerts</div><div class=val style=color:#f59e0b id=alertCount>...</div></div></div>
<div class=card><div style=font-size:12px;color:#8b5cf6;margin-bottom:6px>AI Q&A</div><div class=ai-input><input id=aiInput placeholder="Ask AI..."><button onclick=sendAI()>Send</button></div><div class=ai-output id=aiOutput>Enter your question</div></div>
<div class=card><div style=font-size:12px;color:#8b5cf6;margin-bottom:6px>News Waterfall</div><div id=newsList><div class=loading>Loading news...</div></div></div>
<script>
var SB="https://blhzamrtazxoeibayipb.supabase.co/rest/v1";
var SK="sb_publishable_xyrMuCN1UcUPcAOztYnQ3g_FioMlnB9";
var DS="sk-21acf82adbdc4e13b816931902fb4793";
var H={"apikey":SK,"Authorization":"Bearer "+SK};
async function F(t,p){var r=await fetch(SB+"/"+t+"?"+p,{headers:H});return r.json()}
function E(s){var d=document.createElement("div");d.textContent=s||"";return d.innerHTML}
async function sendAI(){var q=document.getElementById("aiInput").value.trim();if(!q)return;var o=document.getElementById("aiOutput");o.textContent="Thinking...";try{var r=await fetch("https://api.deepseek.com/v1/chat/completions",{method:"POST",headers:{"Authorization":"Bearer "+DS,"Content-Type":"application/json"},body:JSON.stringify({model:"deepseek-chat",messages:[{role:"system",content:"BlackSwan AI. Answer in Chinese. Under 200 chars."},{role:"user",content:q}],max_tokens:500,temperature:0.5})});var d=await r.json();o.textContent=d.choices?.[0]?.message?.content||"API error"}catch(e){o.textContent="Network error"}}
async function L(){try{var s=await F("market_snapshot","select=price,rsi&order=created_at.desc&limit=1");if(s&&s[0]){document.getElementById("btcPrice").textContent="$"+Number(s[0].price||0).toFixed(0);document.getElementById("statusLine").textContent="BTC $"+Number(s[0].price||0).toFixed(0)+" | RSI:"+Number(s[0].rsi||0).toFixed(1)}var n=await F("news","select=tier,category,score,summary,channel_name,received_timestamp&order=received_timestamp.desc&limit=30");document.getElementById("newsTotal").textContent=n.length;document.getElementById("alertCount").textContent=n.filter(function(x){return x.tier==="T0"||x.tier==="T1"}).length;var c=document.getElementById("newsList");if(n.length){c.innerHTML=n.map(function(x){var t=(x.tier||"t3").toLowerCase();var ct=x.category?"["+x.category+"] ":"";var sc=x.score?" s:"+Number(x.score).toFixed(1):"";var tx=x.summary||"";var ts=x.received_timestamp?new Date(x.received_timestamp*1000).toLocaleString("zh-CN",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}):"";return"<div class=news-item><span class=badge "+t+">"+(x.tier||"?")+"</span>"+ct+E(tx)+"<div class=meta>"+ts+" | "+(x.channel_name||"?")+sc+"</div></div>"}).join("")}else{c.innerHTML="<div class=loading>No news yet</div>"}document.getElementById("statusLine").textContent="Online | "+n.length+" news"}catch(e){document.getElementById("statusLine").textContent="Loading..."}}
setInterval(L,30000);L();
</script></body></html>

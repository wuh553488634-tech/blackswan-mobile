<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Black Swan Mobile</title>
<style>
:root{--bg:#0a0e17;--bg2:#111827;--card:#1a1f2e;--border:#2a3040;--txt:#e5e7eb;--txt2:#9ca3af;--txt3:#6b7280;--gr:#10b981;--rd:#ef4444;--yl:#f59e0b;--bl:#3b82f6;--pr:#8b5cf6}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}body{font-family:-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--txt);display:flex;flex-direction:column}

.header{background:linear-gradient(135deg,#1a1040,#0a1a30);border-bottom:2px solid var(--pr);padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:16px;font-weight:800;background:linear-gradient(90deg,var(--pr),var(--bl),var(--gr));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .sub{font-size:9px;color:var(--txt2);display:flex;gap:6px;align-items:center}
.header .live{display:inline-flex;align-items:center;gap:3px;font-size:9px;color:var(--gr)}
.header .live .dot{width:5px;height:5px;border-radius:50%;background:var(--gr)}

.tabs{display:flex;gap:3px;padding:6px 10px;background:var(--bg)}
.tab{flex:1;text-align:center;padding:8px 4px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;background:var(--bg2);border:1px solid var(--border);color:var(--txt2);transition:all .15s}
.tab.active{background:var(--pr);border-color:var(--pr);color:#fff}

.panel{display:none;flex:1;overflow-y:auto}
.panel.active{display:flex;flex-direction:column}

/* News */
#panel-news{padding:0 10px}
.news-list{flex:1;overflow-y:auto}
.news-item{padding:6px 0;border-bottom:1px solid rgba(42,48,64,0.5);font-size:11px;line-height:1.5}
.news-item:last-child{border-bottom:none}
.news-tier{padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;margin-right:4px;vertical-align:middle}
.news-dir{padding:1px 4px;border-radius:2px;font-size:8px;margin-right:4px;vertical-align:middle}
.news-cat{font-size:9px;color:var(--pr);margin-right:4px}
.news-meta{font-size:9px;color:var(--txt3);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}

/* TV */
#panel-tv{display:none;flex-direction:column;flex:1;min-height:0}
#panel-tv.active{display:flex}
.tv-market-bar{display:flex;gap:3px;flex-wrap:wrap;padding:6px 10px;overflow-x:auto;flex-shrink:0}
.tv-mkt{padding:4px 8px;border-radius:4px;font-size:10px;cursor:pointer;background:var(--bg2);border:1px solid var(--border);color:var(--txt2);white-space:nowrap;transition:all .12s}
.tv-mkt.active{background:var(--pr);border-color:var(--pr);color:#fff}
.tv-mkt.crypto{border-color:rgba(139,92,246,0.3)}
.tv-mkt.stock{border-color:rgba(59,130,246,0.3)}
.tv-mkt.commodity{border-color:rgba(245,158,11,0.3)}
.tv-mkt.search-btn{background:transparent;border:1px dashed var(--border);color:var(--txt3);font-style:italic}
.tv-chart-wrapper{flex:1;margin:0 8px 8px;border-radius:8px;overflow:hidden;border:1px solid var(--border);min-height:0;position:relative}.tv-chart-wrapper>div{position:absolute;top:0;left:0;right:0;bottom:0}

/* AI */
#panel-ai{padding:0 10px}
.ai-input-area{display:flex;gap:6px;margin-bottom:6px}
.ai-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--txt);padding:10px 14px;font-size:14px;font-family:inherit;resize:none;min-height:44px}
.ai-input:focus{outline:none;border-color:var(--pr)}
.btn{background:linear-gradient(135deg,var(--pr),var(--bl));color:#fff;border:none;border-radius:10px;padding:10px 18px;font-size:14px;font-weight:700;cursor:pointer}
.btn:disabled{opacity:0.5}
.btn-sm{padding:6px 12px;font-size:11px}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--txt2)}

.ai-output{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:13px;line-height:1.8;white-space:pre-wrap;word-break:break-word;overflow-y:auto}
.ai-output h1{font-size:17px;color:var(--pr);margin:12px 0 6px}
.ai-output h2{font-size:15px;color:var(--bl);margin:10px 0 5px}
.ai-output h3{font-size:13px;color:var(--gr);margin:8px 0 4px}
.ai-output strong{color:var(--yl)}

.loading{text-align:center;padding:30px;color:var(--txt3)}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--pr);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Black Swan Mobile</h1>
    <div class="sub"><span id="headerInfo">Loading...</span></div>
  </div>
  <div class="live"><span class="dot"></span><span id="syncStatus">Live</span></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('news')">News Waterfall</div>
  <div class="tab" onclick="switchTab('tv')">TradingView</div>
  <div class="tab" onclick="switchTab('ai')">AI Q&A</div>
</div>

<!-- News Panel -->
<div class="panel active" id="panel-news">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0 6px">
    <span style="font-size:11px;color:var(--txt3)" id="newsLabel">Loading...</span>
    <button class="btn btn-sm btn-outline" onclick="loadNews()">Refresh</button>
  </div>
  <div class="news-list" id="newsList"></div>
</div>

<!-- TradingView Panel -->
<div class="panel" id="panel-tv">
  <div class="tv-market-bar" id="tvMarkets">
    <button class="tv-mkt crypto active" data-sym="BINANCE:BTCUSD">BTC</button>
    <button class="tv-mkt crypto" data-sym="BINANCE:ETHUSD">ETH</button>
    <button class="tv-mkt crypto" data-sym="BINANCE:SOLUSD">SOL</button>
    <button class="tv-mkt crypto" data-sym="BINANCE:DOGEUSD">DOGE</button>
    <button class="tv-mkt crypto" data-sym="BINANCE:BNBUSD">BNB</button>
    <button class="tv-mkt crypto" data-sym="BINANCE:XRPUSD">XRP</button>
    <button class="tv-mkt stock" data-sym="NASDAQ:AAPL">AAPL</button>
    <button class="tv-mkt stock" data-sym="NASDAQ:NVDA">NVDA</button>
    <button class="tv-mkt stock" data-sym="NASDAQ:TSLA">TSLA</button>
    <button class="tv-mkt stock" data-sym="NASDAQ:MSFT">MSFT</button>
    <button class="tv-mkt stock" data-sym="NYSE:SPY">SPY</button>
    <button class="tv-mkt stock" data-sym="NYSE:QQQ">QQQ</button><button class="tv-mkt search-btn" data-sym="SEARCH_US">US Search</button>
    <button class="tv-mkt stock" data-sym="SSE:000001">上证</button>
    <button class="tv-mkt stock" data-sym="SSE:600519">茅台</button>
    <button class="tv-mkt stock" data-sym="SZSE:300750">宁德</button>
    <button class="tv-mkt stock" data-sym="SSE:601318">平安</button>
    <button class="tv-mkt stock" data-sym="KRX:KOSPI">KOSPI</button><button class="tv-mkt stock" data-sym="HKEX:9988">Ali</button><button class="tv-mkt stock" data-sym="HKEX:0700">Tencent</button><button class="tv-mkt stock" data-sym="HKEX:1810">Xiaomi</button><button class="tv-mkt stock" data-sym="HKEX:9618">JD</button><button class="tv-mkt search-btn" data-sym="SEARCH_HK">HK Search</button>
    <button class="tv-mkt stock" data-sym="TSE:7203">丰田</button>
    <button class="tv-mkt commodity" data-sym="CME_MINI:ES1!">S&P期货</button>
    <button class="tv-mkt commodity" data-sym="NYMEX:CL1!">原油</button>
    <button class="tv-mkt commodity" data-sym="COMEX:GC1!">黄金</button>
    <button class="tv-mkt commodity" data-sym="COMEX:SI1!">白银</button>
    
  </div>
  <div class="tv-chart-wrapper" id="tvChartContainer"></div>
</div>

<!-- AI Panel -->
<div class="panel" id="panel-ai">
  <div class="ai-input-area">
    <textarea class="ai-input" id="aiInput" placeholder="Ask AI... e.g. BTC analysis, RSI, news summary, liquidation risk..." rows="2" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();askAI();}"></textarea>
    <button class="btn" id="btnSend" onclick="askAI()">Send</button>
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">
    <label style="font-size:10px;color:var(--txt2);display:flex;align-items:center;gap:3px"><input type="checkbox" checked onchange="aiSrc.ws_kline=this.checked">K-line</label>
    <label style="font-size:10px;color:var(--txt2);display:flex;align-items:center;gap:3px"><input type="checkbox" checked onchange="aiSrc.indicators=this.checked">Indicators</label>
    <label style="font-size:10px;color:var(--txt2);display:flex;align-items:center;gap:3px"><input type="checkbox" checked onchange="aiSrc.news=this.checked">News</label>
    <label style="font-size:10px;color:var(--txt2);display:flex;align-items:center;gap:3px"><input type="checkbox" checked onchange="aiSrc.liquidation=this.checked">Liquidation</label>
    <button class="btn btn-sm btn-outline" onclick="clearAI()">Clear</button>
  </div>
  <div class="ai-output" id="aiOutput">
    <div style="text-align:center;color:var(--txt3);padding:40px">
      <div style="font-size:40px;margin-bottom:10px">AI</div>
      <div style="font-size:13px">Ask any question. AI receives live data as context.</div>
    </div>
  </div>
</div>

<script>
var SUPABASE_URL="https://blhzamrtazxoeibayipb.supabase.co";
var SUPABASE_ANON="sb_publishable_xyrMuCN1UcUPcAOztYnQ3g_FioMlnB9";
var DEEPSEEK_URL="https://api.deepseek.com/chat/completions";
var _k1="sk-21acf82adbdc4e13b";var _k2="816931902fb4793";var DEEPSEEK_KEY=_k1+_k2;
var H={"apikey":SUPABASE_ANON,"Authorization":"Bearer "+SUPABASE_ANON};
var aiSrc={ws_kline:true,indicators:true,news:true,liquidation:true};
var lastSnapshot=null,lastNews=[],lastKline=[];
var currentSymbol="BINANCE:BTCUSD",tvWidget=null;

function switchTab(name){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});
  var idx=name==='news'?0:name==='tv'?1:2;
  document.querySelectorAll('.tab')[idx].classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
  if(name==='news')loadNews();
  if(name==='tv'&&!tvWidget)initTV();
}

async function sfetch(path){
  var r=await fetch(SUPABASE_URL+"/rest/v1/"+path,{headers:H});
  return r.json();
}

async function loadNews(){
  try{
    var n=await sfetch("news?select=tier,direction,category,score,confidence,summary,channel_name,received_timestamp&order=received_timestamp.desc&limit=50");
    if(n&&n.length){
      lastNews=n;
      var t0t1=n.filter(function(x){return x.tier==='T0'||x.tier==='T1'}).length;
      document.getElementById('headerInfo').textContent='BTC $'+Number((lastSnapshot||{}).price||0).toFixed(1)+' | '+n.length+' news | T0+T1:'+t0t1;
      document.getElementById('newsLabel').textContent='Last 24h | '+n.length+' news ('+t0t1+' T0/T1)';
      var tierColors={t0:'#ef4444',t1:'#f59e0b',t2:'#3b82f6',t3:'#6b7280'};
      var dirMap={bullish:'Long',bearish:'Short',neutral:'-'};
      var rows=n.map(function(x){
        var t=(x.tier||'T3').toLowerCase();
        var dir=dirMap[x.direction]||x.direction||'';
        var dirColor=x.direction==='bullish'?'#10b981':x.direction==='bearish'?'#ef4444':'#9ca3af';
        var cat=x.category?'<span class="news-cat">['+x.category+']</span>':'';
        var sc=x.score!=null?' S:'+Number(x.score).toFixed(1):'';
        var cf=x.confidence!=null?' C:'+Number(x.confidence).toFixed(2):'';
        var ts=x.received_timestamp?new Date(x.received_timestamp*1000).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
        return '<div class="news-item"><span class="news-tier" style="background:'+(tierColors[t]||'#6b7280')+';color:'+(t==='t1'?'#000':'#fff')+'">'+(x.tier||'?')+'</span>'+
          (dir?'<span class="news-dir" style="background:'+dirColor+';color:#fff">'+dir+'</span>':'')+cat+
          '<span>'+(x.summary||x.channel_name||'')+'</span>'+
          '<div class="news-meta"><span>'+ts+'</span><span>'+((x.channel_name||'').slice(0,15))+'</span>'+
          (sc?'<span style="color:var(--yl)">'+sc+'</span>':'')+(cf?'<span style="color:var(--bl)">'+cf+'</span>':'')+'</div></div>';
      }).join('');
      document.getElementById('newsList').innerHTML=rows;
    }else{
      document.getElementById('newsList').innerHTML='<div class="loading">No news yet...</div>';
    }
  }catch(e){console.log(e)}
}

function initTV(){
  var el=document.getElementById('tvChartContainer');
  el.innerHTML='<div class="loading"><div class="spinner"></div> Loading chart...</div>';
  var s=document.createElement('script');
  s.src='https://s3.tradingview.com/tv.js';
  s.onload=function(){
    tvWidget=new TradingView.widget({
      "container_id":"tvChartContainer",
      "symbol":currentSymbol,
      "interval":"60",
      "theme":"dark",
      "style":"1",
      "locale":"zh_CN",
      "toolbar_bg":"#111827",
      "enable_publishing":false,
      "allow_symbol_change":true,
      "save_image":false,
      "width":"100%",
      "height":"100%",
      "studies":["MASimple@tv-basicstudies","RSI@tv-basicstudies","BB@tv-basicstudies"]
    });
  };
  el.appendChild(s);
}

// Market buttons + search
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('tvMarkets').addEventListener('click',function(e){
    if(e.target.classList.contains('tv-mkt')){
      var sym=e.target.dataset.sym;
      if(sym==='SEARCH_US'){
        var q=prompt('US stock (e.g. NASDAQ:GOOGL, NYSE:BABA):',currentSymbol);
        if(!q)return;sym=q.toUpperCase();addMktBtn(sym);
      }else if(sym==='SEARCH_HK'){
        var q=prompt('HK stock (e.g. HKEX:9988, HKEX:0700):',currentSymbol);
        if(!q)return;sym=q.toUpperCase();addMktBtn(sym);
      }else if(sym==='SEARCH'){
        var q=prompt('Enter TradingView symbol:',currentSymbol);
        if(!q)return;
        sym=q.toUpperCase();
        addMktBtn(sym);
      }
      document.querySelectorAll('.tv-mkt').forEach(function(b){b.classList.remove('active')});
      var target=e.target;
      if(target.dataset.sym!=='SEARCH')target.classList.add('active');
      currentSymbol=sym;
      if(tvWidget){
        tvWidget.setSymbol(sym,'60',function(){console.log('Symbol changed to '+sym)});
      }else{
        initTV();
      }
    }
  });
});


function addMktBtn(sym){
  var btn=document.createElement('button');btn.className='tv-mkt stock';
  btn.dataset.sym=sym;btn.textContent=sym.split(':').pop().slice(0,8);
  var ref=document.querySelector('.tv-mkt.search-btn');if(ref)ref.before(btn);
}

async function loadSnapshot(){
  try{
    var d=await sfetch("market_snapshot?select=*&order=id.desc&limit=1");
    if(d&&d.length){lastSnapshot=d[0];}
  }catch(e){}
}

function clearAI(){
  document.getElementById('aiOutput').innerHTML='<div style="text-align:center;color:var(--txt3);padding:40px"><div style="font-size:40px;margin-bottom:10px">AI</div><div style="font-size:13px">Ready for questions.</div></div>';
}

async function askAI(){
  var q=document.getElementById('aiInput').value.trim();
  if(!q)return;
  var out=document.getElementById('aiOutput');
  out.innerHTML='<div class="loading"><div class="spinner"></div> Thinking...</div>';
  document.getElementById('btnSend').disabled=true;
  try{
    var ctx=[];
    if(lastSnapshot){
      var s=lastSnapshot;
      ctx.push("[Market Snapshot] Price:$"+Number(s.price||0).toFixed(1)+" RSI:"+Number(s.rsi||0).toFixed(1)+" BBW:"+Number(s.bbw||0).toFixed(6)+" ATR:"+Number(s.atr||0).toFixed(1)+" MA5:$"+Number(s.ma5||0).toFixed(0)+" MA20:$"+Number(s.ma20||0).toFixed(0)+" MA60:$"+Number(s.ma60||0).toFixed(0)+" Momentum:"+Number(s.momentum||0).toFixed(4)+" VolRatio:"+Number(s.volume_ratio||0).toFixed(2)+" Support:$"+Number(s.support||0).toFixed(0)+" Resistance:$"+Number(s.resistance||0).toFixed(0)+" Funding:"+(Number(s.funding_rate||0)*100).toFixed(4)+"% OI:$"+Number(s.oi_usd||0)+" LongLiq:$"+Number(s.long_liq_zone||0)+" ShortLiq:$"+Number(s.short_liq_zone||0));
    }
    if(lastNews.length){
      ctx.push("[News ("+lastNews.length+" items)]");
      lastNews.slice(0,25).forEach(function(x){ctx.push("["+x.tier+"|"+(x.direction||'')+"|"+(x.category||'')+"] s:"+(x.score||0)+" c:"+(x.confidence||0)+" "+(x.summary||''));});
    }
    var sys="You are Black Swan AI, a financial analyst. Answer in Chinese. Use provided data (snapshot, news). Be data-driven. Analyze crypto, stocks, commodities, forex based on news.";
    var umsg="Data:\n"+ctx.join("\n")+"\n\nQ: "+q;
    var r=await fetch(DEEPSEEK_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+DEEPSEEK_KEY},body:JSON.stringify({model:'deepseek-chat',messages:[{role:'system',content:sys},{role:'user',content:umsg}],max_tokens:4096,temperature:0.7})});
    var j=await r.json();
    if(j.choices&&j.choices[0]){
      out.innerHTML='<div style="font-size:10px;color:var(--txt3);margin-bottom:8px">AI | '+(j.usage?j.usage.total_tokens+'tk':'')+' | '+new Date().toLocaleTimeString('zh-CN')+'</div>'+j.choices[0].message.content;
    }else{
      out.innerHTML='<div style="color:var(--rd)">'+JSON.stringify(j.error||j)+'</div>';
    }
  }catch(e){out.innerHTML='<div style="color:var(--rd)">'+e.message+'</div>';}
  document.getElementById('btnSend').disabled=false;
}

async function init(){
  await loadSnapshot();
  await loadNews();
  document.getElementById('syncStatus').textContent='Live';
}
init();
setInterval(function(){loadSnapshot();loadNews();},30000);
</script>
</body>
</html>
